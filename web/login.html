<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Neuro AI Studio - Login</title>
    <link rel="icon" href="/favicon.ico?v=1" sizes="any" />
    <link rel="icon" href="/Ico/favicon.ico?v=1" sizes="any" />
    <link rel="icon" href="/Ico/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/Ico/apple-touch-icon.png" />
    <link rel="manifest" href="/Ico/site.webmanifest" />
    <link rel="stylesheet" href="styles.css" />
     <link
      rel="icon"
      type="image/png"
      href="../Ico/favicon-96x96.png"
      sizes="96x96"
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="../Ico/favicon.svg"
    />
    <link
      rel="shortcut icon"
      href="../Ico/favicon.ico"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="../Ico/apple-touch-icon.png"
    />
    <link
      rel="manifest"
      href="../Ico/site.webmanifest"
    />
  </head>
  <body>
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-grid"></div>

    <div class="login">
      <div class="login-card">
        <div class="brand">
          <div class="logo">N</div>
          <div class="brand-text">
            <div class="brand-title">Neuro AI</div>
            <div class="brand-subtitle">Accesso riservato</div>
          </div>
        </div>

        <div class="login-title" id="loginTitle">Accedi</div>
        <div class="login-subtitle" id="loginSubtitle">
          Inserisci le tue credenziali per continuare.
        </div>

        <form id="loginForm">
          <label class="field">
            <span>Username</span>
            <input type="text" id="usernameInput" autocomplete="username" />
          </label>
          <label class="field" id="nameField">
            <span>Nome completo</span>
            <input type="text" id="nameInput" placeholder="Es. Marco Rossi" />
          </label>
          <label class="field" id="emailField">
            <span>Email</span>
            <input type="email" id="emailInput" placeholder="nome@email.com" />
          </label>
          <label class="field">
            <span>Password</span>
            <input
              type="password"
              id="passwordInput"
              autocomplete="current-password"
            />
          </label>
          <button type="submit" class="btn btn-primary full" id="submitBtn">
            Entra
          </button>
        </form>

        <div class="login-hint" id="loginHint"></div>
      </div>
    </div>

    <script src="login.js"></script>
  </body>
</html>
